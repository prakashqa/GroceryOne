appId: in.groone.desktop
productName: GroOne
copyright: Copyright © 2026 GroOne

directories:
  buildResources: assets
  output: build

files:
  - "dist/**/*"
  - "package.json"
  - "node_modules/**/*"
  - "!node_modules/**/{CHANGELOG.md,README.md,readme.md,test,__tests__,tests,*.d.ts,*.map}"

# Embedded Postgres ships real .exe binaries that the main process executes.
# They cannot run from inside the asar archive, so unpack them to
# app.asar.unpacked (embedded-postgres resolves them relative to its own dir).
asarUnpack:
  - "node_modules/@embedded-postgres/**"
  - "node_modules/embedded-postgres/**"

# The bundled Next.js UI server AND the bundled NestJS backend run as child
# Node processes, so they live OUTSIDE the asar (asar-packed files can't be
# spawned/required by a separate process reliably). extraResources copies them
# to resources/web-bundle and resources/backend-bundle.
extraResources:
  - from: "web-bundle"
    to: "web-bundle"
  - from: "backend-bundle"
    to: "backend-bundle"

# Windows NSIS installer
win:
  target:
    - target: nsis
      arch: [x64]
  icon: assets/icon.ico
  # v1: no code signing — Windows SmartScreen will show a warning.
  # README explains the "More info → Run anyway" workaround.
  # Phase 3 adds an EV code-signing cert.

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: GroOne
  artifactName: GroOne-Setup-${version}.${ext}

# electron-updater feed (Phase 1: private GitHub Releases).
# When publishing, set GH_TOKEN env var.
publish:
  - provider: github
    owner: prakashqa
    repo: GroceryOne
    releaseType: release
