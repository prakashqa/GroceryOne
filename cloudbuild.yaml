# ================================
# GroceryOne — Cloud Build Pipeline
# ================================
# Triggered on push to main branch.
# Builds the NestJS backend Docker image and deploys to Cloud Run.
#
# Prerequisites:
# 1. Artifact Registry repo created: groceryone (asia-south1)
# 2. Secrets configured in GCP Secret Manager (DB_PASSWORD, JWT_SECRET, REDIS_PASSWORD)
# 3. IAM permissions: Cloud Build → run.admin, compute SA → secretmanager.secretAccessor

steps:
  # Step 1: Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'asia-south1-docker.pkg.dev/$PROJECT_ID/groceryone/backend:$COMMIT_SHA'
      - '-t'
      - 'asia-south1-docker.pkg.dev/$PROJECT_ID/groceryone/backend:latest'
      - '-f'
      - 'backend/Dockerfile'
      - '.'

  # Step 2: Push the Docker image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - 'asia-south1-docker.pkg.dev/$PROJECT_ID/groceryone/backend'

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'groceryone-backend'
      - '--image=asia-south1-docker.pkg.dev/$PROJECT_ID/groceryone/backend:$COMMIT_SHA'
      - '--region=asia-south1'
      - '--platform=managed'
      - '--port=3000'
      - '--memory=512Mi'
      - '--min-instances=0'
      - '--max-instances=3'
      - '--allow-unauthenticated'
      - '--set-env-vars=NODE_ENV=production,DB_HOST=ep-billowing-bush-a11deizd-pooler.ap-southeast-1.aws.neon.tech,DB_PORT=5432,DB_USERNAME=neondb_owner,DB_NAME=neondb,DB_SSL=true,REDIS_HOST=destined-snake-47010.upstash.io,REDIS_PORT=6379,REDIS_TLS=true,CORS_ORIGIN=*,API_PREFIX=api/v1,RATE_LIMIT_TTL=60,RATE_LIMIT_MAX=100,JWT_EXPIRES_IN=1h,JWT_REFRESH_EXPIRES_IN=7d'
      - '--set-secrets=DB_PASSWORD=DB_PASSWORD:latest,JWT_SECRET=JWT_SECRET:latest,REDIS_PASSWORD=REDIS_PASSWORD:latest'

images:
  - 'asia-south1-docker.pkg.dev/$PROJECT_ID/groceryone/backend'

options:
  logging: CLOUD_LOGGING_ONLY
