# ================================
# GroceryOne — Cloud Build Pipeline
# ================================
# Triggered on push to main branch.
# Builds the NestJS backend Docker image and deploys to Cloud Run.
#
# Prerequisites:
# 1. Artifact Registry repo created: groceryone (us-central1)
# 2. Cloud Run service created: groceryone-backend
# 3. Secrets configured in GCP Secret Manager

steps:
  # Step 1: Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/groceryone/backend:$COMMIT_SHA'
      - '-t'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/groceryone/backend:latest'
      - '-f'
      - 'backend/Dockerfile'
      - '.'

  # Step 2: Push the Docker image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/groceryone/backend'

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'groceryone-backend'
      - '--image=us-central1-docker.pkg.dev/$PROJECT_ID/groceryone/backend:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/groceryone/backend'

options:
  logging: CLOUD_LOGGING_ONLY
