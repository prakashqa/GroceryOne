# ================================
# GroceryOne Docker Compose
# Development & Production Setup
# ================================
# Usage:
#   Development: docker-compose up -d
#   Production:  docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#   View logs:   docker-compose logs -f backend
#   Stop:        docker-compose down
#   Reset data:  docker-compose down -v
# ================================

services:
  # -------- PostgreSQL Database --------
  postgres:
    image: postgres:16-alpine
    container_name: groceryone-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-gro_one}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Optional: Add init scripts
      # - ./docker/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-gro_one}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - groceryone-network

  # -------- Redis Cache --------
  redis:
    image: redis:7-alpine
    container_name: groceryone-redis
    restart: unless-stopped
    command: redis-server --appendonly yes ${REDIS_PASSWORD:+--requirepass $REDIS_PASSWORD}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - groceryone-network

  # -------- Backend API (NestJS) --------
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: groceryone-backend
    restart: unless-stopped
    environment:
      # Application
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      API_PREFIX: ${API_PREFIX:-api/v1}

      # Database (use service name as host)
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-gro_one}

      # Redis (use service name as host)
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}

      # Authentication
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-key-change-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1h}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}

      # CORS
      CORS_ORIGIN: ${CORS_ORIGIN:-*}

      # Rate Limiting
      RATE_LIMIT_TTL: ${RATE_LIMIT_TTL:-60}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-100}

      # Seeding
      AUTO_SEED: ${AUTO_SEED:-true}
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - groceryone-network

# -------- Networks --------
networks:
  groceryone-network:
    driver: bridge
    name: groceryone-network

# -------- Volumes --------
volumes:
  postgres_data:
    name: groceryone-postgres-data
  redis_data:
    name: groceryone-redis-data
