name: Backend API E2E Tests

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - 'packages/shared/**'
      - '.github/workflows/api-e2e.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - 'packages/shared/**'

env:
  NODE_VERSION: '20'

jobs:
  api-e2e-tests:
    name: API E2E Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: gro_one_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d gro_one_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      PORT: 3001
      API_PREFIX: api/v1
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_NAME: gro_one_test
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      JWT_SECRET: test-secret-key-for-e2e-testing
      JWT_EXPIRES_IN: 1h
      JWT_REFRESH_EXPIRES_IN: 7d
      CORS_ORIGIN: '*'
      AUTO_SEED: 'false'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared package
        run: npm run shared build

      - name: Build backend
        run: npm run backend build

      - name: Seed test database
        run: npm run backend seed:all

      - name: Run E2E tests
        run: npm run backend test:e2e -- --forceExit
        timeout-minutes: 10

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: api-e2e-results
          path: backend/coverage/
          retention-days: 7
